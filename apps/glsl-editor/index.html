<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GLSL Shader Editor</title>

  <link rel="stylesheet" href="./style.css">

</head>

<body>

<div id="fps" style="
  position: fixed;
  top: 5px;
  left: 5px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  font-family: monospace;
  z-index: 1000;
">
FPS: 0
</div>

<div id="app">

  <!-- Preview -->
  <div id="preview">
    <canvas id="glcanvas"></canvas>
  </div>

  <!-- Resize Divider -->
  <div id="divider"></div>

  <!-- Editor -->
  <div id="editor-panel">

    <div id="toolbar">
      <button id="runBtn">Compile Shader</button>
    </div>

    <div id="editor-container">

      <div id="code-area">

        <div id="line-numbers"></div>

        <pre id="highlighting"></pre>

        <textarea
          id="shaderCode"
          spellcheck="false"
        >
#version 300 es

precision highp float;

uniform float u_time;
uniform vec2 u_resolution;

uniform sampler2D u_texture0;
uniform sampler2D u_texture1;
uniform sampler2D u_texture2;
uniform sampler2D u_texture3;

out vec4 outColor;

void main() {

    vec2 uv = gl_FragCoord.xy / u_resolution;

    outColor = vec4(uv, sin(u_time), 1.0);
}
        </textarea>

      </div>

      <div id="error"></div>

      <!-- Textures slots -->
      <details id="textures-panel">
        <summary>
          <span class="arrow">▶</span>
          Textures
        </summary>
        
        <div class="textures-row">
          <div class="texture-slot">
            <img class="texture-preview" data-texture="0" id="preview0">
          </div>

          <div class="texture-slot">
            <img class="texture-preview" data-texture="1" id="preview1">
          </div>

          <div class="texture-slot">
            <img class="texture-preview" data-texture="2" id="preview2">
          </div>

          <div class="texture-slot">
            <img class="texture-preview" data-texture="3" id="preview3">
          </div>
        </div>
      </details> 

    </div>

  </div>

</div>

<script type="module" src="./main.js"></script>

</body>
</html>
